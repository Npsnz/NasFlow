services:
  - type: web
    name: nasflow-backend
    env: go
    plan: free
    buildCommand: cd backend && go build -o main .
    startCommand: ./main
    envVars:
      - key: DATABASE_URL
        sync: false
    routes:
      - type: http
        path: /
        port: 8080

  - type: pserv
    name: nasflow-postgres
    ipAllowList: []
    plan: free
