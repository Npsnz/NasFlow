services:
  - type: web
    name: nasflow-api
    runtime: go
    buildCommand: cd backend && go build -o server .
    startCommand: ./backend/server
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nasflow-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 8080

databases:
  - name: nasflow-db
    databaseName: nasflow
    user: nasflow
